name: PTA QA Test

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Code Lao
      uses: actions/checkout@v4

    - name: Python Setup Karo
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Chrome Install Karo
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Dependencies Install Karo
      run: |
        pip install pytest
        pip install selenium
        pip install webdriver-manager
        pip install pytest-html

    - name: Tests Chalao aur Report Banao
      run: pytest pta_test.py -v --html=report.html --self-contained-html

    - name: Report Upload Karo
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: QA-Test-Report
        path: report.html
